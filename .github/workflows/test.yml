name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.10.0, 3.11]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v2
      with:
        auto-update-conda: true
        python-version: ${{ matrix.python-version }}
        channels: conda-forge,bioconda,defaults
        channel-priority: strict

    - name: Install dependencies
      shell: bash -l {0}
      run: |
        conda install -c conda-forge -c bioconda \
          python=${{ matrix.python-version }} \
          pandas matplotlib seaborn numpy scipy scikit-learn \
          biopython

    - name: Test Python modules
      shell: bash -l {0}
      run: |
        # Test if Python modules can be imported
        python -c "
        import sys
        sys.path.insert(0, 'src')

        try:
            from genomics_config import GenomicsConfig
            from strain_extractor import get_strain_extractor
            print('✓ All core modules imported successfully')
        except ImportError as e:
            print(f'✗ Import error: {e}')
            sys.exit(1)
        "

    - name: Test pipeline help
      shell: bash -l {0}
      run: |
        python src/automated_genomics_pipeline.py --help

    - name: Test strain extraction (mock)
      shell: bash -l {0}
      run: |
        # Create mock test data
        mkdir -p test_data
        echo ">GCA_123456.1 Levilactobacillus parabrevis strain Test" > test_data/test.fna
        echo "ATCGATCGATCG" >> test_data/test.fna

        # Test strain extraction
        python -c "
        import sys
        sys.path.insert(0, 'src')
        from strain_extractor import get_strain_extractor
        from pathlib import Path

        extractor = get_strain_extractor()
        strain_name, accession, metadata = extractor.extract_strain_name(Path('test_data/test.fna'))
        print(f'Strain: {strain_name}, Accession: {accession}')
        assert strain_name != 'Unknown_strain', 'Strain extraction failed'
        print('✓ Strain extraction test passed')
        "

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.9

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black

    - name: Run flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics

    - name: Check code formatting with black
      run: |
        black --check src/